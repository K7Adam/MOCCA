<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Opencode Agent - Server Connection</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&amp;family=Noto+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<!-- Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2f2f2",
                        "background-light": "#f7f7f7",
                        "background-dark": "#000000", /* Pitch black override */
                        "surface-dark": "#0a0a0a",
                        "glow": "rgba(255, 255, 255, 0.15)"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Noto Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                },
            },
        }
    </script>
<style>
        /* Custom utilities for the specific futuristic look */
        .glass-panel {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        
        .input-glow:focus-within {
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-glow {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
        }
        
        .btn-glow:hover {
            box-shadow: 0 0 35px rgba(255, 255, 255, 0.25);
        }

        .status-ring {
            animation: ripple 2s infinite;
        }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(2.5); opacity: 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display selection:bg-white selection:text-black overflow-hidden relative">
<!-- Subtle background gradient/mesh -->
<div class="fixed inset-0 pointer-events-none z-0 opacity-40">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-gradient-to-br from-white/5 to-transparent rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-gradient-to-tl from-white/5 to-transparent rounded-full blur-[100px]"></div>
</div>
<!-- Main Container -->
<div class="relative z-10 flex flex-col h-full min-h-screen max-w-md mx-auto w-full p-6">
<!-- Header Section -->
<header class="flex justify-between items-start pt-4 pb-12">
<div class="flex flex-col">
<h4 class="text-[#666666] text-xs font-bold leading-normal tracking-[0.2em] uppercase">Opencode Agent</h4>
<div class="h-1 w-8 bg-white/20 mt-2 rounded-full"></div>
</div>
<!-- Minimal Status Pill -->
<div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-[#111] border border-white/5">
<div class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
</div>
<span class="text-[10px] font-medium text-neutral-400 tracking-wide">LISTENING</span>
</div>
</header>
<!-- Main Content (Centered) -->
<main class="flex-1 flex flex-col justify-center gap-8 pb-12">
<!-- Headline & Status Visual -->
<div class="text-center space-y-6">
<!-- Large Status Visual -->
<div class="relative mx-auto w-24 h-24 flex items-center justify-center mb-8">
<div class="absolute inset-0 border border-white/5 rounded-full animate-[spin_10s_linear_infinite]"></div>
<div class="absolute inset-4 border border-white/10 rounded-full animate-[spin_8s_linear_infinite_reverse]"></div>
<span class="material-symbols-outlined text-4xl text-white animate-pulse-slow">wifi_tethering</span>
<!-- Glow behind icon -->
<div class="absolute inset-0 bg-white/5 blur-xl rounded-full"></div>
</div>
<div class="space-y-2">
<h1 class="text-white tracking-tight text-[36px] font-light leading-none">Initialize<br/><span class="font-bold">Connection</span></h1>
<p class="text-[#888] text-sm font-normal leading-relaxed tracking-wide">Establish secure link to local server</p>
</div>
</div>
<!-- Input Form -->
<div class="w-full mt-8 space-y-6">
<!-- Host Input Field -->
<div class="group/input relative input-glow transition-all duration-300 rounded-[2rem]">
<label class="flex flex-col w-full relative">
<span class="sr-only">HOST ADDRESS</span>
<!-- Input Container -->
<div class="relative flex items-center">
<div class="absolute left-6 text-neutral-500 group-focus-within/input:text-white transition-colors">
<span class="material-symbols-outlined text-[20px]">dns</span>
</div>
<input class="w-full bg-[#0F0F0F] text-white border border-[#222] focus:border-white/20 rounded-[2rem] h-16 pl-14 pr-6 text-lg font-normal tracking-wider placeholder:text-[#333] focus:outline-none focus:ring-0 transition-all duration-300" placeholder="192.168.1.x" type="text" value=""/>
<!-- Optional 'Scan' action inside input -->
<button class="absolute right-4 p-2 rounded-full text-neutral-500 hover:text-white hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-[20px]">qr_code_scanner</span>
</button>
</div>
</label>
<p class="text-[#444] text-xs text-center mt-3 font-mono">Input local IP or hostname</p>
</div>
<!-- Connect Button -->
<button class="relative w-full group overflow-hidden bg-primary text-black rounded-full h-16 font-bold text-lg tracking-wide btn-glow transition-all transform active:scale-[0.98]">
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/40 to-transparent translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700 ease-in-out"></div>
<span class="flex items-center justify-center gap-2 relative z-10">
                        CONNECT
                        <span class="material-symbols-outlined text-xl transition-transform group-hover:translate-x-1">arrow_forward</span>
</span>
</button>
</div>
</main>
<!-- Footer -->
<footer class="text-center py-4">
<p class="text-[#333] text-[10px] font-mono tracking-widest uppercase">v1.0.4 // secure-link // encrypted</p>
</footer>
</div>
</body></html>
