<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Connection Alert State</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2f2f2",
                        "background-light": "#f7f7f7",
                        "background-dark": "#050505", // Deep pitch black feel
                        "alert-red": "#FF453A",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                    backdropBlur: {
                        'xs': '2px',
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white overflow-hidden selection:bg-alert-red/30">
<!-- Screen Container -->
<div class="relative flex h-screen w-full flex-col overflow-hidden bg-black">
<!-- Ambient Red Glow Top (Simulating the 'red-tinted glass' feel in the environment) -->
<div class="pointer-events-none absolute top-0 left-0 right-0 h-64 bg-gradient-to-b from-alert-red/10 via-alert-red/5 to-transparent blur-3xl opacity-60"></div>
<!-- Connection Alert Overlay - Floating Pill -->
<!-- This is the 'Subtle, sleek red-tinted glass blur' element -->
<div class="absolute top-12 left-4 right-4 z-50 flex justify-center">
<div class="relative flex w-auto max-w-sm items-center gap-3 overflow-hidden rounded-full border border-alert-red/20 bg-black/40 px-5 py-3 shadow-[0_0_40px_-10px_rgba(255,69,58,0.3)] backdrop-blur-xl">
<!-- Pulsing Status Dot -->
<div class="relative flex size-2.5 shrink-0 items-center justify-center">
<span class="absolute inline-flex h-full w-full animate-ping rounded-full bg-alert-red opacity-75 duration-1000"></span>
<span class="relative inline-flex size-2 rounded-full bg-alert-red"></span>
</div>
<!-- Alert Text -->
<div class="flex flex-1 items-center gap-3 text-sm">
<span class="font-light tracking-wide text-white/90 whitespace-nowrap">Offline: Server Unreachable</span>
<span class="h-4 w-px bg-white/10"></span>
<button class="shrink-0 font-medium text-alert-red hover:text-white transition-colors duration-300">
                        Reconnect
                    </button>
</div>
</div>
</div>
<!-- Simulated Coding Environment (Background Context) -->
<div class="flex flex-1 flex-col pt-32 px-6">
<!-- Code Editor Area -->
<div class="flex flex-col gap-1 font-mono text-sm opacity-60 pointer-events-none select-none">
<div class="flex gap-4">
<span class="w-6 text-right text-white/20">1</span>
<span class="text-purple-400">import</span> <span class="text-white">Agent</span> <span class="text-purple-400">from</span> <span class="text-green-400">'@core/agent'</span>;
                </div>
<div class="flex gap-4">
<span class="w-6 text-right text-white/20">2</span>
<span class="text-purple-400">import</span> { <span class="text-yellow-200">Connect</span> } <span class="text-purple-400">from</span> <span class="text-green-400">'@network/socket'</span>;
                </div>
<div class="flex gap-4">
<span class="w-6 text-right text-white/20">3</span>
</div>
<div class="flex gap-4">
<span class="w-6 text-right text-white/20">4</span>
<span class="text-blue-400">class</span> <span class="text-yellow-200">NeuralLink</span> <span class="text-blue-400">extends</span> <span class="text-yellow-200">Connect</span> {
                </div>
<div class="flex gap-4">
<span class="w-6 text-right text-white/20">5</span>
<span class="pl-4 text-purple-400">async</span> <span class="text-blue-300">initialize</span>() {
                </div>
<div class="flex gap-4">
<span class="w-6 text-right text-white/20">6</span>
<span class="pl-8 text-white/40">// Trying to establish secure handshake...</span>
</div>
<div class="flex gap-4">
<span class="w-6 text-right text-white/20">7</span>
<span class="pl-8 text-purple-400">await</span> <span class="text-blue-300">this</span>.<span class="text-blue-300">handshake</span>(<span class="text-orange-300">true</span>);
                </div>
<div class="flex gap-4">
<span class="w-6 text-right text-white/20">8</span>
<span class="pl-4">}</span>
</div>
<div class="flex gap-4">
<span class="w-6 text-right text-white/20">9</span>
<span class="text-blue-400">}</span>
</div>
</div>
<!-- Soft Overlay to dim the content slightly when offline -->
<div class="absolute inset-0 bg-black/20 pointer-events-none"></div>
</div>
<!-- Bottom Action Bar (Contextual) -->
<div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black via-black to-transparent pt-20 pb-8 px-6">
<div class="flex items-center justify-between">
<div class="flex gap-6 text-white/40">
<span class="material-symbols-outlined cursor-pointer hover:text-white transition-colors" style="font-size: 24px;">terminal</span>
<span class="material-symbols-outlined cursor-pointer hover:text-white transition-colors" style="font-size: 24px;">folder_open</span>
<span class="material-symbols-outlined cursor-pointer hover:text-white transition-colors" style="font-size: 24px;">search</span>
</div>
<!-- Floating Action Button for compilation/run -->
<button class="flex size-14 items-center justify-center rounded-full bg-primary text-black shadow-lg shadow-primary/20 hover:scale-105 transition-transform active:scale-95">
<span class="material-symbols-outlined" style="font-size: 28px;">play_arrow</span>
</button>
</div>
<!-- Safe Area Spacer -->
<div class="h-2 w-full"></div>
</div>
</div>
</body></html>
