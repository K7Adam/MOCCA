# Subflow: Launch MOCCA App
# Reusable component for app initialization
# Usage: runFlow: subflows/common/launch_app.yaml
appId: com.mocca.app
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "(SESSIONS|CHAT|TOOLS|CONNECT TO SERVER|MOCCA|Agents that understand context)"
    timeout: 30000
