# Subflow: Launch MOCCA App
# Reusable component for app initialization
# Usage: runFlow: subflows/common/launch_app.yaml
appId: com.mocca.app
---
- launchApp:
    clearState: true
- tapOn:
    text: "Wait"
    optional: true
- extendedWaitUntil:
    visible: "(SESSIONS|CHAT|TOOLS|Sessions|Chat|Tools|CONNECT TO SERVER|MOCCA|Agents that understand context|Built for what|Making the impossible|From idea to|Code at the speed)"
    timeout: 30000

# Bypass Progressive Onboarding if we are on the Welcome screen
- longPressOn:
    text: "Mobile OpenCode Companion App"
    optional: true

# Wait for Main Screen to be visible
- extendedWaitUntil:
    visible: "(SESSIONS|CHAT|TOOLS|Sessions|Chat|Tools)"
    timeout: 10000
    optional: true

