appId: com.mocca.app
tags:
  - catalog
---
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible: "(SESSIONS|CHAT|TOOLS|CONNECT TO SERVER|MOCCA|Agents that understand context)"
    timeout: 30000

- tapOn:
    id: "dashboard_sessions_tab"
    optional: true
- tapOn:
    text: "(Sessions|SESSIONS)"
    optional: true
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: catalog_sessions_initial

- retry:
    maxRetries: 2
    commands:
      - tapOn:
          text: "(NEW SESSION|New session)"
          retryTapIfNoChange: true

- waitForAnimationToEnd:
    timeout: 2500
- takeScreenshot: catalog_sessions_after_new_session

- tapOn:
    id: "dashboard_chat_tab"
    optional: true
- tapOn:
    text: "(Chat|CHAT)"
    optional: true
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: catalog_chat_after_new_session

