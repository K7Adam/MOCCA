appId: com.mocca.app
tags:
  - catalog
---
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible: "(SESSIONS|CHAT|TOOLS|CONNECT TO SERVER|MOCCA|Agents that understand context)"
    timeout: 30000

- tapOn:
    id: "dashboard_tools_tab"
    optional: true
- tapOn:
    text: "(Tools|TOOLS)"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

- swipe:
    direction: UP
    duration: 450
- waitForAnimationToEnd:
    timeout: 1000
- swipe:
    direction: UP
    duration: 450
- waitForAnimationToEnd:
    timeout: 1000

- retry:
    maxRetries: 2
    commands:
      - tapOn:
          id: "dashboard_settings_nav"
          optional: true
      - tapOn:
          text: "(Settings|SETTINGS)"
          retryTapIfNoChange: true
          optional: true

- extendedWaitUntil:
    visible: "SETTINGS"
    timeout: 10000

- takeScreenshot: catalog_screen_settings_top

- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd:
