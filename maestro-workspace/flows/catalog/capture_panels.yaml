appId: com.mocca.app
tags:
  - catalog
---
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible: "(SESSIONS|CHAT|TOOLS|CONNECT TO SERVER|MOCCA|Agents that understand context)"
    timeout: 30000

- takeScreenshot: catalog_main_center_initial

- tapOn:
    id: "dashboard_sessions_tab"
    optional: true
- tapOn:
    text: "(Sessions|SESSIONS)"
    optional: true
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: catalog_panel_sessions

- tapOn:
    id: "dashboard_chat_tab"
    optional: true
- tapOn:
    text: "(Chat|CHAT)"
    optional: true
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: catalog_panel_chat

- tapOn:
    id: "dashboard_tools_tab"
    optional: true
- tapOn:
    text: "(Tools|TOOLS)"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: catalog_panel_tools_top

- swipe:
    direction: UP
    duration: 450
- waitForAnimationToEnd:
    timeout: 1200
- swipe:
    direction: UP
    duration: 450
- waitForAnimationToEnd:
    timeout: 1200
- takeScreenshot: catalog_panel_tools_scrolled

