# Flow: Create New Session
# Tests creating a new chat session from the context panel
# Tags: @smoke @sessions
appId: com.mocca.app
tags:
  - smoke
  - sessions
---
- runFlow: ../../subflows/common/launch_app.yaml

# Wait for app to be ready
- extendedWaitUntil:
    visible: "(SESSIONS|CHAT|TOOLS|Sessions|Chat|Tools|CONNECT TO SERVER|MOCCA|Agents that understand context|Built for what|Making the impossible|From idea to|Code at the speed)"
    timeout: 15000

# Open sessions panel via bottom navigation
- tapOn:
    id: "dashboard_sessions_tab"
    optional: true
- tapOn:
    text: "(Sessions|SESSIONS)"
    optional: true

# Wait for panel animation
- waitForAnimationToEnd:
    timeout: 2000

# Tap NEW SESSION in context panel
- retry:
    maxRetries: 2
    commands:
      - tapOn:
          text: "(NEW SESSION|New session)"
          retryTapIfNoChange: true

# Wait for potential create animation to settle
- waitForAnimationToEnd:
    timeout: 3000

# Take screenshot to capture result
- takeScreenshot: create_session_result

