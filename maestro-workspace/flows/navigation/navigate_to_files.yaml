# Flow: Navigate to Files
# Tests navigation to files screen via dashboard panel
# Tags: @navigation
appId: com.mocca.app
tags:
  - navigation
---
- runFlow: ../../subflows/common/launch_app.yaml

- extendedWaitUntil:
    visible: "(SESSIONS|CHAT|TOOLS|CONNECT TO SERVER|MOCCA|Agents that understand context)"
    timeout: 15000

# Open tools panel via bottom navigation
- tapOn:
    id: "dashboard_tools_tab"
    optional: true
- tapOn:
    text: "(Tools|TOOLS)"
    optional: true

- waitForAnimationToEnd:
    timeout: 2000

# Tap on Files button
- retry:
    maxRetries: 2
    commands:
      - tapOn:
          id: "dashboard_files_nav"
          optional: true
      - tapOn:
          text: "Files"
          retryTapIfNoChange: true
          optional: true

- extendedWaitUntil:
    visible: "Files"
    timeout: 10000

- takeScreenshot: files_screen

