# Flow: Navigate to Settings
# Tests navigation to settings screen via dashboard panel
# Tags: @smoke @navigation
appId: com.mocca.app
tags:
  - smoke
  - navigation
---
- runFlow: ../../subflows/common/launch_app.yaml

# Wait for app to be ready
- extendedWaitUntil:
    visible: "(SESSIONS|CHAT|TOOLS|CONNECT TO SERVER|MOCCA|Agents that understand context)"
    timeout: 15000

# Open tools panel via bottom navigation
- tapOn: "TOOLS"

- waitForAnimationToEnd:
    timeout: 2000

# Scroll dashboard to quick actions row
- swipe:
    direction: UP
    duration: 450

- waitForAnimationToEnd:
    timeout: 1500

- swipe:
    direction: UP
    duration: 450

- waitForAnimationToEnd:
    timeout: 1500

# Tap on Settings button
- retry:
    maxRetries: 2
    commands:
      - tapOn:
          text: "(Settings|SETTINGS)"
          retryTapIfNoChange: true

# Wait for settings screen
- extendedWaitUntil:
    visible: "SETTINGS"
    timeout: 10000

# Take screenshot
- takeScreenshot: settings_screen
