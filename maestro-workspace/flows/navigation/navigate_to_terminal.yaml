# Flow: Navigate to Terminal
# Tests navigation to terminal screen via dashboard panel
# Tags: @navigation
appId: com.mocca.app
tags:
  - navigation
---
- runFlow: ../../subflows/common/launch_app.yaml

- extendedWaitUntil:
    visible: "(SESSIONS|CHAT|TOOLS|CONNECT TO SERVER|MOCCA|Agents that understand context)"
    timeout: 15000

# Open tools panel via bottom navigation
- tapOn: "(Tools|TOOLS)"

- waitForAnimationToEnd:
    timeout: 2000

# Scroll dashboard to quick actions row
- swipe:
    direction: UP
    duration: 450

- waitForAnimationToEnd:
    timeout: 1500

- swipe:
    direction: UP
    duration: 450

- waitForAnimationToEnd:
    timeout: 1500

- swipe:
    direction: UP
    duration: 450

- waitForAnimationToEnd:
    timeout: 1500

- swipe:
    direction: UP
    duration: 450

- waitForAnimationToEnd:
    timeout: 1500

- swipe:
    direction: UP
    duration: 450

- waitForAnimationToEnd:
    timeout: 1500

# Tap on Terminal button
- retry:
    maxRetries: 2
    commands:
      - tapOn:
          text: "(Terminal|TERMINAL)"
          retryTapIfNoChange: true

- extendedWaitUntil:
    visible: "TERMINAL"
    timeout: 10000

- takeScreenshot: terminal_screen

