# Flow: Navigate to Git
# Tests navigation to git screen via dashboard panel
# Tags: @navigation
appId: com.mocca.app
tags:
  - navigation
---
- runFlow: ../../subflows/common/launch_app.yaml

- extendedWaitUntil:
    visible: "(SESSIONS|CHAT|TOOLS|CONNECT TO SERVER|MOCCA|Agents that understand context)"
    timeout: 15000

# Open tools panel via bottom navigation
- tapOn: "TOOLS"

- waitForAnimationToEnd:
    timeout: 2000

# Tap on Git button
- retry:
    maxRetries: 2
    commands:
      - tapOn:
          text: "GIT STATUS"
          retryTapIfNoChange: true

- extendedWaitUntil:
    visible: "(STATUS|NOT A GIT REPOSITORY)"
    timeout: 10000

- takeScreenshot: git_screen
