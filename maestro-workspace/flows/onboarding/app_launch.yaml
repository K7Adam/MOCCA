# Flow: App Launch
# Verifies that the MOCCA app launches successfully
# Tags: @smoke @critical
appId: com.mocca.app
tags:
  - smoke
  - critical
---
- runFlow: ../../subflows/common/launch_app.yaml

# Verify main UI is displayed
- extendedWaitUntil:
    visible: "(SESSIONS|CHAT|TOOLS|CONNECT TO SERVER|MOCCA|Agents that understand context)"
    timeout: 15000

# Take screenshot for verification
- takeScreenshot: app_launch_success
