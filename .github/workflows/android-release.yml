# MOCCA Continuous Release
#
# Builds a debug APK from main and publishes it as a GitHub Release.
#
# ═══════════════════════════════════════════════════════════════
# NOTE: Signing
# Both debug and release build types use the shared DEBUG keystore
# (androidApp/keystores/debug.keystore). This is EXPECTED for
# internal alpha / GitHub APK distribution. Proper production
# release signing (upload-keystore) is a separate future task.
# ═══════════════════════════════════════════════════════════════
#
# Version scheme:
#   VERSION_NAME (from gradle.properties) + "-build." + run_number
#   Example: 1.0.1-build.42
#   The Gradle build also reads BUILD_NUMBER + CI env vars to set
#   android:versionName in the APK manifest.

name: "MOCCA Continuous Release"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Version
        id: version
        run: |
          # Use run number as build number (incrementing)
          BUILD_NUMBER=${{ github.run_number }}
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

          # Get base version from gradle.properties
          BASE_VERSION=$(grep "VERSION_NAME" gradle.properties | cut -d'=' -f2)

          # Create full version string: 1.0.0-build.123
          FULL_VERSION="${BASE_VERSION}-build.${BUILD_NUMBER}"
          echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV

          echo "Generating release for version: $FULL_VERSION"

      # Release gate: shared tests must pass before building APK
      - name: Run Tests
        run: ./gradlew :composeApp:allTests
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          CI: true

      - name: Build Debug APK
        run: ./gradlew :androidApp:assembleDebug
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          CI: true

      - name: Rename APK
        run: |
          mv androidApp/build/outputs/apk/debug/androidApp-debug.apk mocca-${{ env.FULL_VERSION }}.apk

      - name: Prepare public update channel
        env:
          RELEASE_NOTES: ${{ github.event.head_commit.message }}
        run: |
          APK_NAME="mocca-${{ env.FULL_VERSION }}.apk"
          APK_URL="https://k7adam.github.io/MOCCA/downloads/${APK_NAME}"
          RELEASE_URL="https://github.com/K7Adam/MOCCA/releases/tag/v${{ env.FULL_VERSION }}"
          APK_SIZE=$(stat -c%s "$APK_NAME")
          APK_SHA256=$(sha256sum "$APK_NAME" | awk '{print $1}')
          PUBLISHED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          mkdir -p public/update public/downloads
          cp "$APK_NAME" "public/downloads/$APK_NAME"

          jq -n \
            --arg version "v${{ env.FULL_VERSION }}" \
            --arg releaseNotes "$RELEASE_NOTES" \
            --arg apkUrl "$APK_URL" \
            --arg digest "sha256:${APK_SHA256}" \
            --arg publishedAt "$PUBLISHED_AT" \
            --arg releaseUrl "$RELEASE_URL" \
            --argjson size "$APK_SIZE" \
            '{
              schemaVersion: 1,
              version: $version,
              releaseNotes: $releaseNotes,
              apkUrl: $apkUrl,
              size: $size,
              digest: $digest,
              publishedAt: $publishedAt,
              releaseUrl: $releaseUrl
            }' > public/update/latest.json

          cat > public/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>MOCCA Updates</title>
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <h1>MOCCA Updates</h1>
          <p>Latest update manifest: <a href="./update/latest.json">update/latest.json</a></p>
          HTML

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.FULL_VERSION }}
          name: "v${{ env.FULL_VERSION }}"
          body: |
            ### 🚀 Automated Release v${{ env.FULL_VERSION }}

            **Commit:** ${{ github.sha }}
            **Build:** ${{ github.run_number }}

            ### 📦 Changes
            ${{ github.event.head_commit.message }}
          files: mocca-${{ env.FULL_VERSION }}.apk
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload public update channel
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy public update channel
        id: deployment
        uses: actions/deploy-pages@v4
