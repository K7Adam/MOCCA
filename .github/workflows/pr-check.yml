# MOCCA PR Validation Gate
#
# Runs on every pull request to main. Blocks merge on failure.
# Checks: Gradle wrapper validation, detekt, unit tests, debug build.

name: "MOCCA PR Check"

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: Lint + Test + Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Documentation Sync Check
        shell: pwsh
        run: ./scripts/check-docs-sync.ps1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Detekt
        run: ./gradlew detekt
        env:
          CI: true

      - name: Run Unit Tests
        run: ./gradlew :composeApp:testAndroidHostTest
        env:
          CI: true

      - name: Build Debug APK
        run: ./gradlew :androidApp:assembleDebug
        env:
          CI: true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: composeApp/build/test-results/**/*.xml
          retention-days: 7

      - name: Upload Detekt Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: build/reports/detekt/**/*
          retention-days: 7
