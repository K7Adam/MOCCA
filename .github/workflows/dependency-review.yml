# Dependency Review Action
#
# Scans PRs for known-vulnerable dependencies and invalid licenses.
# Blocks merge if vulnerabilities of moderate severity or higher are introduced.

name: "Dependency Review"

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Vulnerability + License Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
          license-check: false
