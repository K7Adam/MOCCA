<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="atom-one-dark.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #1A1A1A;
    color: #abb2bf;
    font-family: 'JetBrains Mono', 'Fira Code', 'Source Code Pro', monospace;
    font-size: 14px;
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
    overflow: auto;
    height: 100%;
}

/* Override atom-one-dark background to match MOCCA */
.hljs {
    background: #1A1A1A !important;
    padding: 0 !important;
}
pre code.hljs {
    padding: 0 !important;
}

/* Wrapper for line numbers + code */
#view-wrapper {
    display: flex;
    width: 100%;
    height: 100%;
    overflow: auto;
}

#line-gutter {
    flex-shrink: 0;
    width: 50px;
    padding: 16px 12px 16px 0;
    text-align: right;
    color: #4B5263;
    font-family: 'JetBrains Mono', 'Fira Code', 'Source Code Pro', monospace;
    font-size: 13px;
    line-height: 1.5;
    user-select: none;
    border-right: 1px solid #2D2D2D;
    background: #1A1A1A;
    white-space: pre;
}

#code-display {
    flex: 1;
    padding: 16px;
    overflow: auto;
    white-space: pre;
    tab-size: 4;
}

#code-display code {
    font-family: 'JetBrains Mono', 'Fira Code', 'Source Code Pro', monospace;
    font-size: 14px;
    line-height: 1.5;
    tab-size: 4;
}

/* Edit mode textarea */
#code-edit {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    width: 100%;
    height: 100%;
    padding: 16px;
    background: #1A1A1A;
    color: #abb2bf;
    border: none;
    outline: none;
    resize: none;
    font-family: 'JetBrains Mono', 'Fira Code', 'Source Code Pro', monospace;
    font-size: 14px;
    line-height: 1.5;
    tab-size: 4;
    white-space: pre;
    overflow: auto;
    -webkit-text-size-adjust: 100%;
}
</style>
</head>
<body>

<div id="view-wrapper">
    <div id="line-gutter"></div>
    <pre id="code-display"><code id="code-content"></code></pre>
</div>
<textarea id="code-edit" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>

<script src="highlight.min.js"></script>
<script>
(function() {
    var currentContent = '';
    var currentLanguage = 'kotlin';
    var isEditable = false;

    var viewWrapper = document.getElementById('view-wrapper');
    var lineGutter = document.getElementById('line-gutter');
    var codeDisplay = document.getElementById('code-display');
    var codeContent = document.getElementById('code-content');
    var codeEdit = document.getElementById('code-edit');

    function setContent(content, lang) {
        currentContent = content;
        currentLanguage = lang || 'plaintext';
        if (!isEditable) {
            renderView();
        }
    }

    function setEditable(editable) {
        isEditable = editable;
        if (editable) {
            viewWrapper.style.display = 'none';
            codeEdit.style.display = 'block';
            codeEdit.value = currentContent;
            codeEdit.focus();
        } else {
            codeEdit.style.display = 'none';
            viewWrapper.style.display = 'flex';
            renderView();
        }
    }

    function renderView() {
        codeContent.textContent = currentContent;
        codeContent.className = '';
        codeContent.classList.add('language-' + currentLanguage);
        hljs.highlightElement(codeContent);
        renderLineNumbers();
    }

    function renderLineNumbers() {
        var lines = currentContent.split('\n');
        var nums = [];
        for (var i = 1; i <= lines.length; i++) {
            nums.push(i);
        }
        lineGutter.textContent = nums.join('\n');
    }

    // Sync textarea changes back to Kotlin
    codeEdit.addEventListener('input', function() {
        currentContent = codeEdit.value;
        if (typeof AndroidBridge !== 'undefined') {
            AndroidBridge.onContentChanged(currentContent);
        }
    });

    // Expose functions globally for evaluateJavascript calls
    window.setContent = setContent;
    window.setEditable = setEditable;

    // Signal ready to Kotlin
    if (typeof AndroidBridge !== 'undefined') {
        AndroidBridge.onReady();
    }
})();
</script>
</body>
</html>
